name: Release

on:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
        steps:
            - name: Run release-please
              id: release
              uses: googleapis/release-please-action@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

    publish:
        needs: release-please
        if: ${{ needs.release-please.outputs.release_created == 'true' }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write # requis pour l'authentification npm via OIDC (trusted publishing)
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  registry-url: 'https://registry.npmjs.org'

            - name: Upgrade npm (OIDC trusted publishing exige npm >= 11.5.1)
              run: npm install -g npm@latest

            # --ignore-scripts : le package ne publie que des sources (champ "files"),
            # donc on saute prepare (nuxt) inutile ici.
            - name: Publish to npm
              run: npm publish --provenance --access public --ignore-scripts
